# Supabase Configuration

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Public webhooks (no user auth needed)
[functions.resend-webhook]
verify_jwt = false

# Frontend-facing functions: verify_jwt = false because sb_publishable_* keys
# are not JWTs. Auth is enforced inside each function via requireAuth().
[functions.test-mailbox-connection]
verify_jwt = false

